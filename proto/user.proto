syntax = "proto3";

package user;
option go_package = "github.com/Nalatka/GoMovieService/proto;user";

import "google/protobuf/timestamp.proto";

service UserService {
  rpc RegisterUser(RegisterUserRequest) returns (RegisterUserResponse);
  rpc LoginUser(LoginUserRequest)       returns (LoginUserResponse);
  rpc LogoutUser(LogoutUserRequest)     returns (LogoutUserResponse);

  rpc GetUser(GetUserRequest)       returns (GetUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);

  rpc GetWatchlist(GetWatchlistRequest)             returns (GetWatchlistResponse);
  rpc AddToWatchlist(AddToWatchlistRequest)         returns (AddToWatchlistResponse);
  rpc RemoveFromWatchlist(RemoveFromWatchlistRequest) returns (RemoveFromWatchlistResponse);

  rpc GetHistory(GetHistoryRequest)   returns (GetHistoryResponse);
  rpc AddToHistory(AddToHistoryRequest) returns (AddToHistoryResponse);

  rpc GetRecommendations(GetRecommendationsRequest) returns (GetRecommendationsResponse);
}

message User {
  string id         = 1;
  string email      = 2;
  string username   = 3;
  google.protobuf.Timestamp created_at = 4;
}

message RegisterUserRequest {
  string email    = 1;
  string username = 2;
  string password = 3;
}
message RegisterUserResponse {
  User   user  = 1;
  string token = 2;
}

message LoginUserRequest {
  string email    = 1;
  string password = 2;
}
message LoginUserResponse {
  User   user  = 1;
  string token = 2;
}

message LogoutUserRequest  { string token = 1; }
message LogoutUserResponse { bool success = 1; }

message GetUserRequest    { string user_id = 1; }
message GetUserResponse   { User user      = 1; }

message UpdateUserRequest {
  string user_id  = 1;
  string username = 2;
  string email    = 3;
}
message UpdateUserResponse { User user = 1; }

message DeleteUserRequest  { string user_id = 1; }
message DeleteUserResponse { bool success   = 1; }

message WatchlistItem {
  string movie_id  = 1;
  string title     = 2;
  google.protobuf.Timestamp added_at = 3;
}

message GetWatchlistRequest      { string user_id  = 1; }
message GetWatchlistResponse     { repeated WatchlistItem items = 1; }
message AddToWatchlistRequest    { string user_id = 1; string movie_id = 2; }
message AddToWatchlistResponse   { bool success   = 1; }
message RemoveFromWatchlistRequest { string user_id = 1; string movie_id = 2; }
message RemoveFromWatchlistResponse { bool success  = 1; }

message HistoryItem {
  string movie_id         = 1;
  string title            = 2;
  int32  watched_seconds  = 3;
  google.protobuf.Timestamp watched_at = 4;
}

message GetHistoryRequest    { string user_id = 1; int32 limit = 2; }
message GetHistoryResponse   { repeated HistoryItem items = 1; }
message AddToHistoryRequest  { string user_id = 1; string movie_id = 2; int32 watched_seconds = 3; }
message AddToHistoryResponse { bool success   = 1; }

message GetRecommendationsRequest  { string user_id = 1; int32 limit = 2; }
message GetRecommendationsResponse { repeated string movie_ids = 1; }
